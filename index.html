<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 文件站点</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .card {
            display: block;
            padding: 20px;
            margin: 15px 0;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.2);
        }
        .card h2 { font-size: 18px; margin-bottom: 8px; color: #667eea; }
        .card p { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📂 HTML 文件站点</h1>
        <a class="card" href="FootBallBTI_Test.html">
            <h2>⚽ FootBallBTI Test</h2>
            <p>足球 BTI 测试页面</p>
        </a>
        <a class="card" href="final_ios.html">
            <h2>📱 Final iOS</h2>
            <p>iOS 最终版页面 (4.2MB)</p>
        </a>
    </div>
</body>
</html>
