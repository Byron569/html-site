<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyBTI Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(120, 80, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 80, 120, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(80, 200, 255, 0.1) 0%, transparent 50%);
            z-index: 0;
            animation: bgShift 10s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 60px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 56px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #7c5aff, #ff5a7c);
            margin-bottom: 24px;
            font-size: 36px;
            box-shadow: 0 8px 32px rgba(124, 90, 255, 0.3);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #666;
            font-size: 15px;
            margin-top: 10px;
            font-weight: 400;
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 28px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.07);
            border-color: rgba(124, 90, 255, 0.3);
            box-shadow:
                0 12px 40px rgba(0,0,0,0.3),
                0 0 60px rgba(124, 90, 255, 0.08);
        }

        .card-icon {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .card-icon.football {
            background: linear-gradient(135deg, #2d8f4e, #1a6b35);
            box-shadow: 0 4px 16px rgba(45, 143, 78, 0.3);
        }

        .card-icon.csgo {
            background: linear-gradient(135deg, #e8a817, #c4870f);
            box-shadow: 0 4px 16px rgba(232, 168, 23, 0.3);
        }

        .card-text h2 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #f0f0f0;
        }

        .card-text p {
            font-size: 13px;
            color: #777;
            font-weight: 400;
        }

        .card-arrow {
            margin-left: auto;
            color: #444;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .card:hover .card-arrow {
            color: #7c5aff;
            transform: translateX(4px);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 56px;
            color: #333;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 40px 16px; }
            .header h1 { font-size: 28px; }
            .card { padding: 18px 20px; gap: 16px; }
            .card-icon { width: 44px; height: 44px; font-size: 22px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="header">
            <div class="logo">🎯</div>
            <h1>AnyBTI Test</h1>
            <p>选择一个测试项目开始</p>
        </div>

        <div class="cards">
            <a class="card" href="FootBallBTI_Test.html">
                <div class="card-icon football">⚽</div>
                <div class="card-text">
                    <h2>FootBallBTI Test</h2>
                    <p>足球 BTI 测试</p>
                </div>
                <span class="card-arrow">→</span>
            </a>

            <a class="card" href="final_ios.html">
                <div class="card-icon csgo">🎯</div>
                <div class="card-text">
                    <h2>CSGOBTI Test</h2>
                    <p>CSGO BTI 测试</p>
                </div>
                <span class="card-arrow">→</span>
            </a>
        </div>

        <div class="footer">
            Powered by GitHub Pages
        </div>
    </div>
</body>
</html>
