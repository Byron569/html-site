  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }

    /* Grass field background */
    .grass-bg {
      background:
        repeating-linear-gradient(
          90deg,
          rgba(22,163,74,0.03) 0px,
          rgba(22,163,74,0.03) 2px,
          transparent 2px,
          transparent 40px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(22,163,74,0.015) 0px,
          rgba(22,163,74,0.015) 1px,
          transparent 1px,
          transparent 8px
        ),
        linear-gradient(180deg, #f8fafc 0%, #f0fdf4 50%, #f8fafc 100%);
    }

    /* Football field decorative lines */
    .field-lines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .field-lines::before {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 300px; border: 2px solid rgba(22,163,74,0.06); border-radius: 50%;
    }
    .field-lines::after {
      content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(22,163,74,0.06) 20%, rgba(22,163,74,0.06) 80%, transparent);
    }

    /* Particle canvas */
    #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    /* Animations */
    @keyframes fadeScaleIn {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes slideUpStagger {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes pulseGreen {
      0%, 100% { box-shadow: 0 0 20px rgba(22,163,74,0.2); }
      50% { box-shadow: 0 0 40px rgba(22,163,74,0.4); }
    }
    @keyframes spinSlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes bounceBall {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    @keyframes borderFlash {
      0%, 100% { border-color: #16a34a; }
      50% { border-color: #22c55e; box-shadow: 0 0 16px rgba(22,163,74,0.3); }
    }
    @keyframes radarExpand {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes labelFadeIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .animate-fadeScaleIn { animation: fadeScaleIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .animate-slideUpStagger { animation: slideUpStagger 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    .animate-pulseGreen { animation: pulseGreen 2s ease-in-out infinite; }
    .animate-spinSlow { animation: spinSlow 3s linear infinite; }
    .animate-bounceBall { animation: bounceBall 0.6s ease-in-out infinite; }
    .animate-borderFlash { animation: borderFlash 0.8s ease-in-out; }
    .animate-radarExpand { animation: radarExpand 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; transform-origin: center; }
    .animate-labelFadeIn { animation: labelFadeIn 0.6s ease-out forwards; opacity: 0; }

    /* iOS-style page transition animations */
    @keyframes slideOutLeft {
      0% { transform: translateX(0) scale(1); opacity: 1; }
      100% { transform: translateX(-4%) scale(0.97); opacity: 0; }
    }
    @keyframes slideInRight {
      0% { transform: translateX(4%) scale(0.97); opacity: 0; }
      100% { transform: translateX(0) scale(1); opacity: 1; }
    }
    @keyframes slideOutRight {
      0% { transform: translateX(0) scale(1); opacity: 1; }
      100% { transform: translateX(4%) scale(0.97); opacity: 0; }
    }
    @keyframes slideInLeft {
      0% { transform: translateX(-4%) scale(0.97); opacity: 0; }
      100% { transform: translateX(0) scale(1); opacity: 1; }
    }
    .slide-out-left { animation: slideOutLeft 0.38s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    .slide-in-right { animation: slideInRight 0.38s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    .slide-out-right { animation: slideOutRight 0.38s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
    .slide-in-left { animation: slideInLeft 0.38s cubic-bezier(0.32, 0.72, 0, 1) forwards; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

    .pos-card { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .option-btn {

    .nav-btn {

    }
    .nav-btn:disabled {

      cursor: not-allowed;
    }

  <script>
    // Grass particles (green/white grass clippings)
    (function(){
      const c=document.getElementById('particle-canvas'),x=c.getContext('2d');let ps=[];
      function rz(){c.width=innerWidth;c.height=innerHeight}addEventListener('resize',rz);rz();
      function P(){this.reset()}
      P.prototype.reset=function(){
        this.x=Math.random()*c.width;
        this.y=-10;
        this.s=Math.random()*2+0.5;
        this.vx=(Math.random()-.5)*.3;
        this.vy=Math.random()*1+0.3;
        this.o=Math.random()*.3+.05;
        this.rot=Math.random()*Math.PI*2;
        this.rotV=(Math.random()-.5)*.02;
        this.color=Math.random()>0.5?'green':'white';
      };
      P.prototype.update=function(){
        this.x+=this.vx;this.y+=this.vy;this.rot+=this.rotV;
        if(this.y>c.height+10)this.reset();
      };
      P.prototype.draw=function(){
        x.save();x.translate(this.x,this.y);x.rotate(this.rot);
        if(this.color==='green'){
          x.fillStyle='rgba(22,163,74,'+this.o+')';
          x.fillRect(-this.s,-this.s*2,this.s*2,this.s*4);
        } else {
          x.fillStyle='rgba(255,255,255,'+this.o+')';
          x.beginPath();x.arc(0,0,this.s,0,Math.PI*2);x.fill();
        }
        x.restore();
      };
      for(let i=0;i<40;i++){const p=new P();p.y=Math.random()*c.height;ps.push(p);}
      (function a(){x.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.update();p.draw()});requestAnimationFrame(a)})();
    })();
  </script>

    // ===== 算法函数 =====

    // 马氏距离
    function mahalanobisDistance(userVec, meanVec, varVec) {
      let sum = 0;
      for (let i = 0; i < userVec.length; i++) {
        const diff = userVec[i] - meanVec[i];
        sum += (diff * diff) / varVec[i];
      }
      return Math.sqrt(sum);
    }

    // 对数高斯概率密度
    function logGaussianPDF(userVec, meanVec, varVec) {
      const k = userVec.length;
      let logDet = 0;
      let mahal = 0;
      for (let i = 0; i < k; i++) {
        logDet += Math.log(varVec[i]);
        const diff = userVec[i] - meanVec[i];
        mahal += (diff * diff) / varVec[i];
      }
      return -0.5 * (k * Math.log(2 * Math.PI) + logDet + mahal);
    }

    // GMM 对数似然
    function gmmLogLikelihood(userVec, player) {
      const logWeights = player.modes.map(m => Math.log(m.weight));
      const logPDFs = player.modes.map(m => logGaussianPDF(userVec, m.mean, m.var));
      const logTerms = logWeights.map((lw, i) => lw + logPDFs[i]);
      return logSumExp(logTerms);
    }

    // logSumExp
    function logSumExp(logValues) {
      const maxLog = Math.max(...logValues);
      if (maxLog === -Infinity) return -Infinity;
      let sumExp = 0;
      for (const lv of logValues) {
        sumExp += Math.exp(lv - maxLog);
      }
      return maxLog + Math.log(sumExp);
    }

    // 贝叶斯后验概率
    function computePosteriorProbs(userVec, players) {
      const logLikelihoods = players.map(p => gmmLogLikelihood(userVec, p));
      const maxLL = Math.max(...logLikelihoods);
      const likelihoods = logLikelihoods.map(ll => Math.exp(ll - maxLL));
      const total = likelihoods.reduce((a, b) => a + b, 0);
      return likelihoods.map(l => l / total);
    }


    // 分布对齐：将用户向量映射到球员向量的分布空间
    function alignToPlayerDistribution(userVec, players) {
      // 1) 统计每个维度上所有球员的均值和标准差
      const means = [0,0,0,0,0,0,0,0];
      const stds = [0,0,0,0,0,0,0,0];
      const n = players.length;
      for (const p of players) {
        for (let d = 0; d < 8; d++) means[d] += p.vector[d];
      }
      for (let d = 0; d < 8; d++) means[d] /= n;
      for (const p of players) {
        for (let d = 0; d < 8; d++) stds[d] += Math.pow(p.vector[d] - means[d], 2);
      }
      for (let d = 0; d < 8; d++) stds[d] = Math.sqrt(stds[d] / n);
      
      // 2) 将用户向量从 [0, 100] 映射到球员分布空间
      // 用户向量的 50 = 平均值，映射到球员均值
      // 用户向量的 ±1 标准差(约10点) 映射到球员的1个标准差
      return userVec.map((v, d) => {
        const userStdScale = 15; // 用户向量中1个标准差约15点
        const zScore = (v - 50) / userStdScale;
        return Math.round(means[d] + zScore * stds[d]);
      });
    }

    // 两阶段匹配：先找大类，再精确匹配
    
    // 根据vector特征分配subPositions
    function assignSubPositions(player) {
      const v = player.vector;
      const subs = [];
      // cf: 高进攻+高身体
      if(v[0]>70 && v[4]>50) subs.push('cf');
      // winger: 高突破+高速度
      if(v[2]>65 && v[6]>65) subs.push('winger');
      // ss: 高进攻+高组织
      if(v[0]>65 && v[1]>55) subs.push('ss');
      // b2b: 各维度较均衡
      if(v[0]>45 && v[3]>40 && v[6]>50) subs.push('b2b');
      // am: 高组织+高进攻
      if(v[1]>70 && v[0]>50) subs.push('am');
      // dm: 高防守+高战术
      if(v[3]>65 && v[5]>55) subs.push('dm');
      // dlp: 高组织+中防守
      if(v[1]>65 && v[3]>35) subs.push('dlp');
      // cb: 高防守+高身体
      if(v[3]>75 && v[4]>55) subs.push('cb');
      // awb: 中防守+高突破+高速度
      if(v[3]>40 && v[2]>50 && v[6]>55) subs.push('awb');
      // dwb: 高防守+低进攻
      if(v[3]>70 && v[0]<45) subs.push('dwb');
      // gk: 极高防守+极低进攻
      if(v[3]>80 && v[0]<25) subs.push('gk');
      if(subs.length===0) subs.push('b2b'); // 默认
      return subs;
    }

    // ================================================================
    // GMM + 贝叶斯后验概率 + Mahalanobis 距离匹配算法
    // ================================================================
    // 每个球员建模为高斯混合模型（多模态），EM算法拟合，
    // 贝叶斯后验概率计算匹配度，天然支持多模态球员画像。
    // ================================================================

    function findBestMatches(userVec, players, selectedPositions, k = 3) {
      // ================================================================
      // 两阶段漏斗：聚类粗筛 → GMM 精排
      // ================================================================
      // 阶段 A：位置过滤 + Mahalanobis 距离聚类粗筛（漏斗入口）
      // 阶段 B：在粗筛范围内构建局部 GMM + EM 拟合
      // 阶段 C：贝叶斯后验概率（区分度高，不做人为平均）
      // ================================================================
      const D = 8;
      const VAR_FLOOR = 40;
      const EM_ITERS = 40;
      const LAMBDA = 0.25;
      const CLUSTER_THRESHOLD = 1.5;  // 距最佳簇中心距离 < 阈值的都纳入

      // ============================================================
      // 辅助函数
      // ============================================================
      function logSumExp(arr) {
        const mx = Math.max(...arr);
        if (mx === -Infinity) return -Infinity;
        const sum = arr.reduce((s, v) => s + Math.exp(v - mx), 0);
        return mx + Math.log(sum + 1e-300);
      }

      function mahalDist(x, mu, sigma) {
        let dist = 0;
        for (let d = 0; d < D; d++) {
          const diff = x[d] - mu[d];
          dist += (diff * diff) / sigma[d];
        }
        return dist;
      }

      function logGaussian(x, mu, sigma) {
        const mahal = mahalDist(x, mu, sigma);
        let logDet = 0;
        for (let d = 0; d < D; d++) logDet += Math.log(sigma[d]);
        return -0.5 * (D * Math.log(2 * Math.PI) + logDet + mahal);
      }

      // ============================================================
      // 阶段 A：位置过滤 + 分布对齐 + 聚类粗筛
      // ============================================================

      // A1: 位置过滤
      let posPool = players;
      if (selectedPositions && selectedPositions.length > 0) {
        posPool = players.filter(p => {
          if (!p.subPositions) p.subPositions = assignSubPositions(p);
          return p.subPositions.some(sp => selectedPositions.includes(sp));
        });
      }
      if (posPool.length < 5) posPool = players;

      // A2: 分布对齐
      const N = posPool.length;
      const dimMeans = Array(D).fill(0);
      const dimStds  = Array(D).fill(0);
      for (const p of posPool) for (let d = 0; d < D; d++) dimMeans[d] += p.vector[d];
      for (let d = 0; d < D; d++) dimMeans[d] /= N;
      for (const p of posPool) for (let d = 0; d < D; d++) dimStds[d] += Math.pow(p.vector[d] - dimMeans[d], 2);
      for (let d = 0; d < D; d++) dimStds[d] = Math.sqrt(dimStds[d] / N) || 1;

      const aligned = userVec.map((v, d) => {
        const z = (v - 50) / 15;
        return Math.max(0, Math.min(100, dimMeans[d] + z * dimStds[d]));
      });

      // A3: 计算到所有聚类中心的 Mahalanobis 距离
      const clusterDists = PLAYER_CLUSTERS.map((c, ci) => {
        let dist = 0;
        for (let d = 0; d < D; d++) {
          const diff = aligned[d] - c.centroid[d];
          // 使用该簇的方差估计（从球员数据推算）
          dist += (diff * diff) / 200;  // 簇方差约200（经验值）
        }
        return { idx: ci, dist: Math.sqrt(dist) };
      });
      clusterDists.sort((a, b) => a.dist - b.dist);

      // A4: 选取最佳簇 + 周边簇（阈值内）
      const bestClusterDist = clusterDists[0].dist;
      const selectedClusterIdxs = clusterDists
        .filter(c => c.dist < bestClusterDist * CLUSTER_THRESHOLD + 0.5)
        .map(c => c.idx);

      // A5: 从选中簇中收集候选球员
      const candidateIds = new Set();
      for (const ci of selectedClusterIdxs) {
        for (const pid of PLAYER_CLUSTERS[ci].players) {
          candidateIds.add(pid);
        }
      }

      // 候选池：位置过滤 ∩ 簇筛选
      let candidatePool = posPool.filter(p => candidateIds.has(p.id));
      // 保底：至少保留10人
      if (candidatePool.length < 10) {
        // 补充位置过滤池中距离最近的球员
        const dists = posPool.map(p => ({
          p,
          dist: mahalDist(aligned, p.vector, Array(D).fill(200))
        }));
        dists.sort((a, b) => a.dist - b.dist);
        const existingIds = new Set(candidatePool.map(p => p.id));
        for (const d of dists) {
          if (candidatePool.length >= 15) break;
          if (!existingIds.has(d.p.id)) candidatePool.push(d.p);
        }
      }

      const C = candidatePool.length;

      // ============================================================
      // 阶段 B：在候选池上构建局部 GMM + EM 拟合
      // ============================================================

      // B1: 构建 GMM 分量（每个球员的每个 mode = 一个分量）
      const components = [];
      candidatePool.forEach((p, idx) => {
        (p.modes || []).forEach((m, mi) => {
          components.push({
            mean: m.mean.slice(),
            var: m.var.map(v => Math.max(v, VAR_FLOOR)),
            weight: m.weight || (1 / p.modes.length),
            playerId: p.id,
            modeIdx: mi
          });
        });
      });
      const M = components.length;
      if (M === 0) {
        return candidatePool.slice(0, k).map((p, i) => ({
          ...p, matchProb: i === 0 ? 0.5 : 0.25,
          archetype: ARCHETYPES[clusterDists[0].idx] || ARCHETYPES[0]
        }));
      }

      // 归一化权重
      const wSum = components.reduce((s, c) => s + c.weight, 0);
      components.forEach(c => c.weight /= wSum);

      // B2: EM 拟合
      const observations = candidatePool.map(p => p.vector);
      const OBS_N = observations.length;

      function precomputeLogNorm(comp) {
        let logDet = 0;
        for (let d = 0; d < D; d++) logDet += Math.log(comp.var[d]);
        return 0.5 * (D * Math.log(2 * Math.PI) + logDet);
      }

      let logNorms = components.map(precomputeLogNorm);

      for (let iter = 0; iter < EM_ITERS; iter++) {
        // E-step
        const gamma = new Array(OBS_N);
        for (let n = 0; n < OBS_N; n++) {
          const logProbs = new Array(M);
          for (let m = 0; m < M; m++) {
            const mahal = mahalDist(observations[n], components[m].mean, components[m].var);
            logProbs[m] = Math.log(components[m].weight + 1e-300) - logNorms[m] - 0.5 * mahal;
          }
          const maxLP = Math.max(...logProbs);
          const exps = logProbs.map(lp => Math.exp(lp - maxLP));
          const sumExp = exps.reduce((a, b) => a + b, 0);
          gamma[n] = exps.map(e => e / (sumExp + 1e-300));
        }

        // M-step
        // 计算全局方差（用于正则化）
        const poolVar = Array(D).fill(0);
        for (const obs of observations) {
          for (let d = 0; d < D; d++) {
            const diff = obs[d] - dimMeans[d];
            poolVar[d] += diff * diff;
          }
        }
        for (let d = 0; d < D; d++) poolVar[d] /= OBS_N;

        for (let m = 0; m < M; m++) {
          let Nm = 0;
          for (let n = 0; n < OBS_N; n++) Nm += gamma[n][m];
          if (Nm < 1e-6) continue;

          const newMean = Array(D).fill(0);
          for (let n = 0; n < OBS_N; n++) {
            for (let d = 0; d < D; d++) {
              newMean[d] += gamma[n][m] * observations[n][d];
            }
          }
          for (let d = 0; d < D; d++) newMean[d] /= Nm;

          const newVar = Array(D).fill(0);
          for (let n = 0; n < OBS_N; n++) {
            for (let d = 0; d < D; d++) {
              const diff = observations[n][d] - newMean[d];
              newVar[d] += gamma[n][m] * diff * diff;
            }
          }
          for (let d = 0; d < D; d++) {
            newVar[d] = (newVar[d] / Nm) + LAMBDA * poolVar[d];
            newVar[d] = Math.max(newVar[d], VAR_FLOOR);
          }

          components[m].mean = newMean;
          components[m].var = newVar;
          components[m].weight = Nm / OBS_N;
        }

        logNorms = components.map(precomputeLogNorm);
      }

      // ============================================================
      // 阶段 C：贝叶斯后验概率（区分度优先）
      // ============================================================

      // C1: 对每个候选球员计算 log P(player|user)
      const playerLogPostMap = {};
      for (const comp of components) {
        const logL = logGaussian(aligned, comp.mean, comp.var);
        const logTerm = Math.log(comp.weight + 1e-300) + logL;
        const pid = comp.playerId;
        if (!playerLogPostMap[pid]) playerLogPostMap[pid] = [];
        playerLogPostMap[pid].push(logTerm);
      }

      // C2: 聚合每个球员的多模态分量
      const playerScores = [];
      for (const pid in playerLogPostMap) {
        const logPost = logSumExp(playerLogPostMap[pid]);
        playerScores.push({ playerId: pid, logPosterior: logPost });
      }

      // C3: 排序
      playerScores.sort((a, b) => b.logPosterior - a.logPosterior);

      // C4: 贝叶斯归一化（只在候选池内归一化，不做全局平均）
      // 使用温度缩放来放大区分度
      const TEMPERATURE = 0.5;  // <1 放大差距，>1 缩小差距
      const maxLog = playerScores[0].logPosterior;
      const scaledLogProbs = playerScores.map(p =>
        (p.logPosterior - maxLog) / TEMPERATURE
      );
      const rawProbs = scaledLogProbs.map(lp => Math.exp(lp));
      const rawSum = rawProbs.reduce((a, b) => a + b, 0);
      const finalProbs = rawProbs.map(p => p / rawSum);

      // C5: 找最佳聚类 → Archetype
      const bestClusterIdx = clusterDists[0].idx;
      const archetype = ARCHETYPES[bestClusterIdx] || ARCHETYPES[0];

      // C6: 返回 Top-K（概率自然分化，不做人为封顶）
      const topK = playerScores.slice(0, k);
      const playerMap = {};
      candidatePool.forEach(p => playerMap[p.id] = p);

      return topK.map((t, i) => {
        const p = playerMap[t.playerId];
        return {
          ...p,
          matchProb: finalProbs[i],
          archetype: archetype,
          logPosterior: t.logPosterior
        };
      });
    }

    // 位置适配度 — 11个子位置的 Mahalanobis 距离
    // 质心和方差从397名球员数据计算得出
    function classifyPosition(vector) {
      const POS_META = {
        cf:   { name:'中锋 🎯', emoji:'🎯' },
        winger:{ name:'边锋 💨', emoji:'💨' },
        ss:   { name:'影子前锋 👻', emoji:'👻' },
        b2b:  { name:'B2B中场 🔋', emoji:'🔋' },
        am:   { name:'进攻型中场 🧠', emoji:'🧠' },
        dm:   { name:'防守型中场 🛡️', emoji:'🛡️' },
        dlp:  { name:'拖后型中场 🎭', emoji:'🎭' },
        cb:   { name:'中后卫 🧱', emoji:'🧱' },
        awb:  { name:'进攻型边后卫 ✈️', emoji:'✈️' },
        dwb:  { name:'防守型边后卫 🔒', emoji:'🔒' },
        gk:   { name:'门将 🧤', emoji:'🧤' }
      };
      // 质心（从球员数据计算）
      const centroids = {
        cf:   [87,59,74,27,72,67,69,70],
        winger:[79,66,85,29,47,67,80,69],
        ss:   [77,70,61,32,52,74,63,71],
        b2b:  [70,54,64,38,62,66,57,63],
        am:   [70,85,59,54,64,71,60,67],
        dm:   [59,60,45,77,55,80,56,74],
        dlp:  [49,80,68,53,68,74,62,65],
        cb:   [45,56,45,87,76,74,73,71],
        awb:  [72,75,72,57,66,73,79,68],
        dwb:  [29,49,45,85,50,80,68,76],
        gk:   [15,43,25,90,73,75,70,73]
      };
      // 方差（带下限保护）
      const posVar = {
        cf:   [80,357,179,103,184,293,289,257],
        winger:[288,223,120,80,219,299,80,369],
        ss:   [120,149,266,100,300,342,278,421],
        b2b:  [420,284,490,364,451,207,120,208],
        am:   [234,100,278,319,352,233,291,285],
        dm:   [466,179,343,161,378,242,120,385],
        dlp:  [80,103,289,120,345,222,425,149],
        cb:   [236,206,241,60,185,268,268,357],
        awb:  [228,245,182,187,314,262,129,257],
        dwb:  [100,147,254,70,85,230,235,165],
        gk:   [50,172,334,50,292,305,237,275]
      };

      const scores = [];
      for (const [pos, centroid] of Object.entries(centroids)) {
        let dist = 0;
        for (let d = 0; d < 8; d++) {
          const diff = vector[d] - centroid[d];
          const v = Math.max(posVar[pos][d], 50);
          dist += (diff * diff) / v;
        }
        const mahal = Math.sqrt(dist);
        // 转换为0-100的适配度分数（距离越小分数越高）
        const score = Math.round(100 * Math.exp(-mahal / 8));
        scores.push({
          pos: pos,
          name: POS_META[pos].name,
          emoji: POS_META[pos].emoji,
          score: score,
          mahal: Math.round(mahal * 10) / 10
        });
      }

      scores.sort((a, b) => b.score - a.score);
      return { primary: scores[0], secondary: scores[1], scores };
    }

    // 向量计算 — 多信号对比评分算法
    function calculateUserVector(answers, questions) {
      const dimScores = [0, 0, 0, 0, 0, 0, 0, 0];
      const dimCounts = [0, 0, 0, 0, 0, 0, 0, 0];

      for (const ans of answers) {
        const q = questions.find(q => q.id === ans.questionId);
        if (!q || !ans.ratings) continue;
        const ratings = ans.ratings;
        const totalStars = ratings.reduce((a, b) => a + b, 0);
        if (totalStars === 0) continue;

        const spreads = [0,0,0,0,0,0,0,0];
        for (let d = 0; d < 8; d++) {
          const vals = q.options.map(o => o.weights[d]);
          spreads[d] = Math.max(...vals) - Math.min(...vals);
        }
        const maxSpread = Math.max(...spreads);

        for (let d = 0; d < 8; d++) {
          if (spreads[d] < maxSpread * 0.2) continue;
          const dimWeights = q.options.map(o => o.weights[d]);
          const maxW = Math.max(...dimWeights);
          const minW = Math.min(...dimWeights);
          if (maxW === minW) continue;

          let userPref = 0;
          for (let o = 0; o < 4; o++) {
            const normalizedW = (dimWeights[o] - minW) / (maxW - minW) * 2 - 1;
            userPref += normalizedW * ratings[o];
          }
          userPref /= totalStars;

          const starVariance = ratings.reduce((sum, r) => sum + Math.pow(r - totalStars/4, 2), 0) / 4;
          const confidence = Math.min(1, starVariance / 1.2);
          const signal = userPref * (0.5 + 0.5 * confidence) * (spreads[d] / maxSpread);
          dimScores[d] += signal;
          dimCounts[d] += 1;
        }
      }

      return dimScores.map((score, d) => {
        if (dimCounts[d] === 0) return 50;
        const avg = score / dimCounts[d];
        return Math.round(Math.max(0, Math.min(100, (avg + 1) * 50)));
      });
    }

    // 雷达图
    function RadarChart({ data, compareData, labels, title, animate = true }) {
      const canvasRef = React.useRef(null);
      const [progress, setProgress] = React.useState(animate ? 0 : 1);

      React.useEffect(() => {
        if (!animate) { setProgress(1); return; }
        let start = null;
        const duration = 1200;
        function step(ts) {
          if (!start) start = ts;
          const elapsed = ts - start;
          const p = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          setProgress(eased);
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }, [animate]);

      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height;
        const cx = W / 2, cy = H / 2;
        const R = Math.min(W, H) / 2 - 50;
        const n = 8;

        ctx.clearRect(0, 0, W, H);

        // Draw grid
        for (let level = 1; level <= 5; level++) {
          const r = (R * level) / 5;
          ctx.beginPath();
          for (let i = 0; i <= n; i++) {
            const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = level === 5 ? "rgba(22,163,74,0.2)" : "rgba(22,163,74,0.08)";
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        // Draw axes
        for (let i = 0; i < n; i++) {
          const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
          ctx.strokeStyle = "rgba(22,163,74,0.1)";
          ctx.lineWidth = 1;
          ctx.stroke();

          // Labels
          const labelR = R + 30;
          const lx = cx + labelR * Math.cos(angle);
          const ly = cy + labelR * Math.sin(angle);
          ctx.font = "12px 'Noto Sans SC', sans-serif";
          ctx.fillStyle = "#475569";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(labels[i], lx, ly);
        }

        // Draw data polygon
        function drawPolygon(values, color, alpha) {
          ctx.beginPath();
          for (let i = 0; i <= n; i++) {
            const idx = i % n;
            const angle = (Math.PI * 2 * idx) / n - Math.PI / 2;
            const r = (R * values[idx] / 100) * progress;
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.fillStyle = color.replace(")", `,${alpha})`).replace("rgb", "rgba");
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();

          // Draw dots
          for (let i = 0; i < n; i++) {
            const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
            const r = (R * values[i] / 100) * progress;
            const x = cx + r * Math.cos(angle);
            const y = cy + r * Math.sin(angle);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
          }
        }

        if (compareData) drawPolygon(compareData, "rgb(148,163,184)", 0.15);
        drawPolygon(data, "rgb(22,163,74)", 0.25);

      }, [data, compareData, progress, labels]);

      return React.createElement("div", { className: "relative" },
        title && React.createElement("h3", { className: "text-center text-sm font-medium text-slate-500 mb-2" }, title),
        React.createElement("canvas", { ref: canvasRef, width: 350, height: 350, className: "w-full max-w-[350px] mx-auto" })
      );
    }

      const [displayQ, setDisplayQ] = React.useState(0);

      const q = questions[displayQ];

      React.useEffect(() => {
        const existing = answers.find(a => a.questionId === q.id);
        if (existing) {
          setRatings(existing.ratings);
        } else {
          setRatings([0, 0, 0, 0]);
        }
      }, [displayQ]);

      function handleRate(optIdx, star) {
        const newRatings = [...ratings];
        newRatings[optIdx] = newRatings[optIdx] === star ? 0 : star;
        setRatings(newRatings);
      }

      function saveCurrentRatings() {
        const newAnswers = [...answers];
        const existIdx = newAnswers.findIndex(a => a.questionId === q.id);
        const entry = { questionId: q.id, ratings: [...ratings] };
        if (existIdx >= 0) {
          newAnswers[existIdx] = entry;
        } else {
          newAnswers.push(entry);
        }
        setAnswers(newAnswers);
        return newAnswers;
      }

      function transition(direction, callback) {
        const outClass = direction === "left" ? "slide-out-left" : "slide-out-right";
        const inClass = direction === "left" ? "slide-in-right" : "slide-in-left";
        setAnimClass(outClass);
        setTimeout(() => {
          callback();
          setAnimClass(inClass);
          setTimeout(() => setAnimClass(""), 380);
        }, 380);
      }

      const canProceed = ratings.some(r => r > 0);

      function handleNext() {
        if (!canProceed) return;
        const updatedAnswers = saveCurrentRatings();
        if (currentQ < total - 1) {
          const nextIdx = currentQ + 1;
          transition("left", () => {
            setCurrentQ(nextIdx);
            setDisplayQ(nextIdx);
          });
        } else {
          onComplete(updatedAnswers);
        }
      }

      function handlePrev() {
        saveCurrentRatings();
        if (currentQ > 0) {
          const prevIdx = currentQ - 1;
          transition("right", () => {
            setCurrentQ(prevIdx);
            setDisplayQ(prevIdx);
          });

          React.createElement("div", { className: "space-y-4 mb-8" },
            matches.map((m, i) =>
              React.createElement("div", {
                key: m.id,
                className: `bg-white rounded-2xl shadow-lg p-5 flex items-center gap-4 ${
                  i === 0 ? "ring-2 ring-gold-500 animate-pulseGreen" : ""
                }`
              },
                React.createElement("div", {
                  className: `text-3xl font-black ${
                    i === 0 ? "text-gold-500" : i === 1 ? "text-slate-400" : "text-amber-700"
                  }`
                }, ["🥇", "🥈", "🥉"][i]),
                React.createElement("div", { className: "flex-1" },
                  React.createElement("div", { className: "flex items-center gap-2" },
                    React.createElement("h3", { className: "font-bold text-slate-800" }, m.name),
                    React.createElement("span", {
                      className: "text-xs px-2 py-0.5 rounded-full bg-grass-50 text-grass-600 font-medium"
                    }, m.label)
                  ),
                  React.createElement("p", { className: "text-xs text-slate-400 mt-0.5" },
                    `${m.team} · ${m.position === "forward" ? "前锋" : m.position === "midfielder" ? "中场" : m.position === "defender" ? "后卫" : "门将"}`
                  ),
                  React.createElement("p", { className: "text-sm text-slate-500 mt-1" }, m.desc)
                ),
                React.createElement("div", { className: "text-right" },
                  React.createElement("div", { className: "text-2xl font-black text-grass-600" },
                    Math.round(m.matchProb * 100) + "%"
                  ),
                  React.createElement("div", { className: "text-xs text-slate-400" }, "匹配度")
                )
              )
            )
          ),

          // Radar Chart
          React.createElement("div", { className: "bg-white rounded-2xl shadow-lg p-6 mb-6" },
            React.createElement(RadarChart, {
              data: userVector,
              compareData: matches[0].vector,
              labels: labels,
              title: "你的能力雷达图（绿色）vs 最佳匹配（灰色）"
            })
          ),

          // Position breakdown
          React.createElement("div", { className: "bg-white rounded-2xl shadow-lg p-6 mb-6" },
            React.createElement("h3", { className: "font-bold text-slate-800 mb-3" }, "📊 11位置适配度"),
            React.createElement("div", { className: "space-y-2" },
              posResult.scores.map(s =>
                React.createElement("div", { key: s.pos, className: "flex items-center gap-3" },
                  React.createElement("span", { className: "text-sm text-slate-600 w-36" }, s.name),
                  React.createElement("div", { className: "flex-1 h-3 bg-slate-100 rounded-full overflow-hidden" },
                    React.createElement("div", {
                      className: "h-full bg-gradient-to-r from-grass-500 to-grass-400 rounded-full data-bar",
                      style: { width: (s.score / posResult.scores[0].score * 100) + "%" }
                    })
                  ),
                  React.createElement("span", { className: "text-xs text-slate-400 w-12 text-right" },
                    s.score + "分"
                  )
                )
              )
            )
          ),

          // User vector detail
          React.createElement("div", { className: "bg-white rounded-2xl shadow-lg p-6 mb-8" },
            React.createElement("h3", {
              className: "font-bold text-slate-800 mb-3 cursor-pointer flex items-center justify-between",
              onClick: () => setShowDetails(!showDetails)
            },
              React.createElement("span", null, "🔬 八维能力详情"),
              React.createElement("span", { className: "text-slate-400 text-sm" }, showDetails ? "收起 ▲" : "展开 ▼")
            ),
            showDetails && React.createElement("div", { className: "space-y-2" },
              DIMENSIONS.map((d, i) =>
                React.createElement("div", { key: d.id, className: "flex items-center gap-3" },
                  React.createElement("span", { className: "text-sm text-slate-600 w-20" }, d.name),
                  React.createElement("div", { className: "flex-1 h-3 bg-slate-100 rounded-full overflow-hidden" },
                    React.createElement("div", {
                      className: "h-full rounded-full data-bar",
                      style: { width: userVector[i] + "%", background: d.color }
                    })
                  ),
                  React.createElement("span", { className: "text-xs text-slate-400 w-8 text-right" }, userVector[i])
                )
              )
            )
          ),

          // Restart
          React.createElement("div", { className: "text-center" },
            React.createElement("button", {
              onClick: onRestart,
              className: "btn-primary bg-gradient-to-r from-grass-600 to-grass-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg"
            }, "重新测试 🔄")
          )
        )
      );
    }

    // ErrorBoundary
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      render() {
        if (this.state.hasError) {
          return React.createElement("div", {
            className: "min-h-screen flex items-center justify-center p-4"
          },
            React.createElement("div", { className: "text-center" },
              React.createElement("div", { className: "text-5xl mb-4" }, "😵"),
              React.createElement("h2", { className: "text-xl font-bold text-slate-700 mb-2" }, "出了点问题"),
              React.createElement("p", { className: "text-slate-500 mb-4" }, "页面加载出错，请刷新重试"),
              React.createElement("button", {
                onClick: () => location.reload(),
                className: "btn-primary bg-grass-600 text-white px-6 py-2 rounded-lg"
              }, "刷新页面")
            )
          );
        }
        return this.props.children;
      }
    }

    // 主应用
    
    function App() {
      const [screen, setScreen] = useState("intro");
      const [selectedPositions, setSelectedPositions] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [answers, setAnswers] = useState([]);
      const [matches, setMatches] = useState([]);
      const [userVector, setUserVector] = useState([]);

      function handleStart() { setScreen("position"); }

      function handlePositionComplete(positions) {
        setSelectedPositions(positions);
        // 根据选择的位置加载题目
        const qs = [];
        for(const posId of positions) {
          if(POSITION_QUESTIONS[posId]) qs.push(...POSITION_QUESTIONS[posId]);
        }
        if(qs.length === 0) qs.push(...POSITION_QUESTIONS.cf);
        setQuestions(qs);
        setScreen("quiz");
      }

      function handleComplete(ans) {
        setAnswers(ans);
        setScreen("loading");
        setTimeout(() => {
          const vec = calculateUserVector(ans, questions);
          setUserVector(vec);
          const top3 = findBestMatches(vec, PRO_PLAYERS, selectedPositions, 3);
          setMatches(top3);
          setScreen("result");
        }, 1500);
      }

      function handleRestart() {
        setScreen("intro");
        setSelectedPositions([]);
        setQuestions([]);
        setAnswers([]);
        setMatches([]);
        setUserVector([]);
      }

      return React.createElement(ErrorBoundary, null,
        screen === "intro" && React.createElement(IntroScreen, {onStart:handleStart}),
        screen === "position" && React.createElement(PositionSelectScreen, {onComplete:handlePositionComplete}),
        screen === "quiz" && React.createElement(QuizScreen, {questions:questions, onComplete:handleComplete}),
        screen === "loading" && React.createElement(LoadingScreen, null),
        screen === "result" && React.createElement(ResultScreen, {matches, userVector, answers, questions, onRestart:handleRestart})
      );
    }


    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(App, null)
    );
  </script>
</body>
</html>
