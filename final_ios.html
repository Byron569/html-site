        body { background-color: #09090b; color: #f4f4f5; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 3px; }

        .elastic-click { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease; }
        .elastic-click:active { transform: scale(0.92); transition: transform 0.08s ease-out; }
        .elastic-click:hover { transform: scale(1.02); }

        /* 弹性选中动画 */
        @keyframes star-pop {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); }
            50% { transform: scale(0.9); }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .star-pop { animation: star-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* 按钮弹性点击 */
        @keyframes btn-bounce {
            0% { transform: scale(1); }
            20% { transform: scale(0.88); }
            50% { transform: scale(1.06); }
            70% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }
        .btn-bounce { animation: btn-bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* 选项卡片弹性选中 */
        @keyframes card-select {
            0% { transform: scale(1); border-color: rgb(63 63 70); }
            30% { transform: scale(1.03); border-color: rgb(6 182 212); }
            60% { transform: scale(0.98); }
            100% { transform: scale(1); border-color: rgb(6 182 212); }
        }
        .card-selected { animation: card-select 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        .perspective-container { perspective: 1200px; transform-style: preserve-3d; }

        /* 完美平台风格全息动画 */
        @keyframes holo-materialize {
            0% { opacity: 0; transform: scaleY(0.8) scaleX(0.9) translateZ(-100px); filter: blur(20px); }
            100% { opacity: 1; transform: scaleY(1) scaleX(1) translateZ(0); filter: blur(0); box-shadow: 0 0 30px rgba(6, 182, 212, 0.2); }
        }
        .holo-card { opacity: 0; animation: holo-materialize 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes scanline { 0% { top: -10%; } 100% { top: 110%; } }
        .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: rgba(6, 182, 212, 0.8); box-shadow: 0 0 15px #06b6d4; animation: scanline 3s infinite linear; z-index: 50; pointer-events: none; }

<script type="module">

const MotionPrimitives = {
  // Fade + slide up on mount
  FadeInUp: memo(({ children, delay = 0, className = '', as = 'div' }) =>
    React.createElement(motion[as] || motion.div, {
      className,
      initial: { opacity: 0, y: 16, scale: 0.97 },

  Stagger: memo(({ children, baseDelay = 0, step = 0.08, className = '' }) =>
    React.createElement(motion.div, {

const ProgressBar = memo(({ current, total, label, color = '#06b6d4' }) => {
  const pct = Math.round(((current + 1) / total) * 100);
  const segments = 5;

// ═══════════════════════════════════════════════════════════════════════════
// ─── StarSelector — Animated with Framer Motion ───────────────────────────
// ═══════════════════════════════════════════════════════════════════════════

const StarSelector = memo(({ value, onChange, max = 5, accent = '#06b6d4', disabled = false }) => {
  const [animStar, setAnimStar] = useState(null);
  const [sparkles, setSparkles] = useState([]);
  const sparkleId = useRef(0);

  const handleClick = (star, e) => {
    if (disabled) return;
    const newVal = value === star ? 0 : star;
    const rect = e.currentTarget.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    setAnimStar(star);
    setTimeout(() => setAnimStar(null), 500);

    if (newVal > 0) {
      const particles = [];
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const dist = 16 + Math.random() * 22;
        particles.push({
          id: ++sparkleId.current,
          x: cx, y: cy,
          vx: Math.cos(angle) * dist,
          vy: Math.sin(angle) * dist,
        });
      }
      setSparkles(prev => [...prev, ...particles].slice(-40));
      setTimeout(() => {
        setSparkles(prev => prev.filter(p => !particles.find(np => np.id === p.id)));
      }, 800);
    }

    onChange(newVal);
  };

  const stars = [];
  for (let i = 1; i <= max; i++) {

    const isAnimThis = animStar === i;

    stars.push(
      React.createElement('button', {
        key: i,
        onClick: (e) => handleClick(i, e),

        className: 'vp-star',

      },
        React.createElement(motion.svg, {
          width: 28, height: 28, viewBox: '0 0 24 24',
          fill: active ? accent : 'none',
          stroke: active ? accent : 'rgba(255,255,255,0.12)',
          strokeWidth: '1.5',
          style: {
            filter: active ? `drop-shadow(0 0 8px ${accent}88)` : 'none',
          },
          // Framer Motion: scale + rotate on toggle
          animate: isAnimThis
            ? { scale: [1, 1.45, 0.85, 1.12, 1], rotate: [0, -8, 8, -4, 0] }
            : { scale: 1, rotate: 0 },
          transition: { duration: 0.45, ease: 'easeOut' },
          whileHover: disabled ? {} : { scale: 1.2 },
          whileTap: disabled ? {} : { scale: 0.85 },
        },
          React.createElement('polygon', {
            points: '12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2',
          })
        )
      )
    );
  }

  return React.createElement('div', {
    className: 'flex items-center gap-1',
    style: { padding: '4px 2px', borderRadius: '999px', background: 'rgba(255,255,255,0.02)', position: 'relative' },
  },
    ...stars,
    // Sparkle particles via Framer Motion
    React.createElement(AnimatePresence, null,
      sparkles.map(s =>
        React.createElement(motion.div, {
          key: s.id,
          initial: { x: 0, y: 0, scale: 1, opacity: 0.9 },
          animate: { x: s.vx, y: s.vy, scale: 0, opacity: 0 },
          exit: { opacity: 0 },
          transition: { duration: 0.6, ease: 'easeOut' },
          style: {
            position: 'fixed', left: s.x, top: s.y,
            width: '3px', height: '3px', borderRadius: '50%',
            background: '#22d3ee', pointerEvents: 'none', zIndex: 9999,
          },
        })
      )
    ),
    // Counter with AnimatePresence for flip effect
    React.createElement(AnimatePresence, { mode: 'wait' },
      value > 0 && React.createElement(motion.span, {
        key: value,
        initial: { rotateX: 90, opacity: 0 },
        animate: { rotateX: 0, opacity: 1 },
        exit: { rotateX: -90, opacity: 0 },
        transition: { duration: 0.3, ease: [0.16, 1, 0.3, 1] },
        className: 'vp-mono',
        style: { marginLeft: '6px', fontSize: '0.65rem', color: accent, fontWeight: 700 },
      }, `${value * 20}%`)
    )
  );
});

const DIM_NAMES = ['绝对火力', '破点侵略', '团队协同', '残局生存', '狙击偏好', '战术大脑'];

const RadarChart = memo(({ user, player, size = 260, animated = false }) => {

      style: animated ? { strokeDasharray: pathLength } : {},

      points: pts(user),

      transition: { duration: 1.2, ease: [0.16, 1, 0.3, 1] },
      style: animated ? { strokeDasharray: pathLength } : {},
    }),
    // Labels
    DIM_NAMES.map((name, i) => {
      const a = (i * 60 - 90) * Math.PI / 180;

        key: i,
        x: c + (r + 22) * Math.cos(a),

            { title: "场景13: 面对保枪老六", text: "回合已赢，还剩15秒，对面最后一人躲起来保枪了。", options: [ { text: "哪怕只有一把手枪我也要去缴他，满地图狂奔找人，杀心拉满。", modifiers: [3, 5, -4, -4, 0, 0] }, { text: "跟队友一起抱团去抓，确保能补枪绝对不白给对面送钱。", modifiers: [0, 2, 3, -2, 0, -3] }, { text: "绝不去缴，躲在掩体里切刀玩，死了掉枪掉甲太亏了。", modifiers: [-2, -5, -1, 5, 2, 1] } ] },
            { title: "场景14: T方阵型默认(Default)", text: "回合刚开始，大家都在后场做默认控图。你喜欢干什么？", options: [ { text: "拿着AK直接去中路拼第一身位，就是要拿首杀建立优势。", modifiers: [4, 5, -4, -4, 0, -1] }, { text: "跟着大部队，帮大哥丢掩护闪，或者卡住侧翼防止被前压。", modifiers: [-1, -3, 4, 2, 0, -2] }, { text: "去地图边缘单向通道挂机(Lurk)，一动不动等有缘人前压送死。", modifiers: [1, -5, -2, 5, 2, -1] } ] },
            { title: "场景15: 屏幕全白的瞬间反应", text: "你被全白(Full Blind)，并且听到大批脚步声逼近。", options: [ { text: "凭记忆中的坐标疯狂泼水扫射，谁也别想无伤靠近我。", modifiers: [3, 2, -2, -4, -1, 2] }, { text: "凭着恐怖的地图理解，闭着眼睛连跳(Bhop)退回掩体。", modifiers: [0, -3, -1, 4, 0, 0] }, { text: "立刻低头/背身蹲下，狂喊队友帮忙反丢闪光弹。", modifiers: [-2, -3, 3, 2, 0, 0] } ] },
            { title: "场景16: 连跳与身法(Movement)", text: "你需要通过一条被敌方架死的大马路。你通过火力网的方式是？", options: [ { text: "直接干拉出去跟他硬对，把他杀了路自然就通了。", modifiers: [4, 3, -2, -5, 0, 0] }, { text: "极限空转(Air-strafe)和连跳，破坏对面的准星强行飞过去。", modifiers: [0, 4, -2, 1, 1, -4] }, { text: "老老实实丢过点烟或者瞬爆闪，绝不用身体接子弹。", modifiers: [-2, -4, 2, 3, 0, 1] } ] },
            { title: "场景17: 战术假打(Fake)的执行", text: "你负责在A区假打制造动静，大家去B。作为唯一诱饵，你会？", options: [ { text: "假打打成真打，我直接把A区防守全杀穿了，叫队友赶紧过来。", modifiers: [4, 5, -3, -4, -1, -1] }, { text: "疯狂狂扔道具一顿乱炸，自己绝对不露头，苟住小命。", modifiers: [-2, -4, 2, 4, 0, 0] }, { text: "静步在A附近晃悠，等CT回防去B的时候我在侧道拿个免费背身。", modifiers: [1, -3, -1, 3, 1, -1] } ] },
            { title: "场景18: 极限残局的信息提取", text: "1v3的究极残局，雷达一片黑，全图没信息。", options: [ { text: "纯靠枪法和肌肉记忆，走到哪杀到哪，遇事不决就是干。", modifiers: [4, 4, -4, -4, 0, 0] }, { text: "调大耳机音量，捕捉最微小的脚步声，用声音构建立体雷达。", modifiers: [0, -2, -1, 4, 1, -2] }, { text: "换位思考，揣摩对面的抓人心理，提前预判对面可能的包抄路线。", modifiers: [-1, -3, 2, 3, 0, -1] } ] },
            { title: "场景19: 补枪间距的把控", text: "进攻方清排拐角，你走在突破手后面，通常保持怎样的距离？", options: [ { text: "我嫌他走得太慢，经常不小心自己冲到第一身位去了。", modifiers: [3, 5, -4, -4, -1, 1] }, { text: "贴得非常紧，他只要倒下，我的子弹已经在对面头上了，极致一换一。", modifiers: [2, 1, 5, -3, -2, -3] }, { text: "离得比较远，我怕被一颗闪全白，倾向于在远端架枪掩护。", modifiers: [-2, -4, 2, 4, 3, -3] } ] },
            { title: "场景20: 交叉火力与非常规位", text: "防守方面对敌方大部队RUSH，你选择的站位是？", options: [ { text: "主动顶在最前面，追求先发制人撕裂对面的默认阵型。", modifiers: [4, 4, -3, -5, 0, 0] }, { text: "和队友形成完美的90度交叉火力，严格执行「你拉我补」。", modifiers: [-1, -3, 5, 1, -1, -1] }, { text: "卖队友，我躲在死角，等队友拉扯出敌方背身时我再出来收割。", modifiers: [1, -5, -4, 5, 1, 2] } ] },
            { title: "场景21: 被架死时的破局", text: "明确知道对面大狙已经架死了你必经的过道。怎么破局？", options: [ { text: "大身位跳拉或者极速小身位晃身开枪(Jiggle)，用身法强吃他。", modifiers: [3, 4, -2, -4, 1, -2] }, { text: "叫队友一起双拉(Double Peek)，用两条命换他一枪的空隙。", modifiers: [1, 2, 4, -4, -1, -2] }, { text: "要一颗瞬爆闪或者封隔断烟，绝对不用身体硬接大狙子弹。", modifiers: [-2, -4, 2, 3, 0, 1] } ] },
            { title: "场景22: 手枪局(Pistol)的压迫感", text: "第一局大家都是USP/Glock。你在手枪局展现出的身法和准度偏向于？", options: [ { text: "站桩瞄头快速连续点射，对自己的爆头线极度自信。", modifiers: [5, 1, -2, -2, -1, -1] }, { text: "疯狂ADAD左右横移，鼠标跟着乱甩，把游戏玩成身法躲子弹。", modifiers: [1, 4, -1, -3, 0, -1] }, { text: "买道具不买甲，躲在后面丢完道具就藏起来等捡队友的枪。", modifiers: [-2, -4, 2, 4, 0, 0] } ] },
            { title: "场景23: 压枪转移(Spray Transfer)", text: "面对复数敌人，你的火力分配习惯是？", options: [ { text: "左键死都不松，强行拉动鼠标把准星拖到第二个人身上(弹幕洗头)。", modifiers: [5, 3, -3, -4, -1, 0] }, { text: "立刻松开鼠标，重置后坐力，重新瞄准第二个人的头单点。", modifiers: [2, -2, 0, 2, 0, -2] }, { text: "打死一个够本了，立刻疯狂后撤找掩体躲起来要闪光。", modifiers: [-2, -4, 2, 4, 0, 0] } ] },
            { title: "场景24: T方突破搜点习惯", text: "你负责第一个进包点清理点位，搜点细节偏向于？", options: [ { text: "一边跑一边狂晃鼠标，看到一点风吹草动就直接扫射。", modifiers: [1, 5, -3, -4, -1, 2] }, { text: "严格的预瞄(Pre-aim)，切出掩体瞬间准星已经在头上了，像个机器人。", modifiers: [4, 1, 1, 0, 2, -8] }, { text: "我一般不走第一个，我喜欢捏着道具跟在突破手后面准备补枪。", modifiers: [-2, -5, 4, 3, 0, 0] } ] },
            { title: "场景25: CT方前压控制", text: "防守方总是在包点被道具炸得坐牢。为了打破僵局，你会？", options: [ { text: "开局直接买大狙前压到匪口，必须抽掉对面的突破手破局。", modifiers: [2, 4, -2, -4, 5, -5] }, { text: "要一颗队友的瞬爆闪，双人前压反清夺回控制权。", modifiers: [0, 2, 4, -2, 0, -4] }, { text: "彻底放弃包点，大家全躲在后点交叉火力位打非常规回防。", modifiers: [-2, -5, 2, 5, 0, 0] } ] },
            { title: "场景26: 狙击枪盲狙(No-scope)", text: "拿着AWP突然被步枪贴脸糊了。极近距离你的肌肉反应是？", options: [ { text: "完全不慌，直接左键盲狙或者瞬狙，相信自己的人品和玄学手感。", modifiers: [3, 3, -2, -3, 4, -5] }, { text: "立刻切出手枪或者沙鹰，用极其风骚的身法躲子弹反杀。", modifiers: [1, 2, -1, -2, 1, -1] }, { text: "转头就跑，利用掩体绕圈圈逃命，拼命呼叫队友支援。", modifiers: [-2, -4, 3, 4, -1, 0] } ] },
            { title: "场景27: 信息屏蔽与专注度", text: "残局只剩你一人，队友在YY里疯狂教你打游戏。你会？", options: [ { text: "极其暴躁地吼一句「闭嘴」，然后按自己的莽夫思路强行拉出去操作。", modifiers: [3, 4, -4, -4, 0, 1] }, { text: "一键屏蔽语音，化身毫无感情的机器，不受干扰地冷静拆解残局。", modifiers: [1, -2, -3, 5, 1, -2] }, { text: "边听队友报点边打，高度依赖队友死亡视角提供的信息。", modifiers: [-2, -2, 4, 2, 0, -2] } ] },
            { title: "场景28: 防守方的选位逻辑", text: "作为防守方CT，你最喜欢站在什么样的位置？", options: [ { text: "最容易交火的一线位，第一时间与敌人接触。", modifiers: [3, 5, -2, -5, 0, -1] }, { text: "能包抄敌人后路的侧翼位，随时准备回防偷屁股。", modifiers: [1, -2, -1, 3, 1, -2] }, { text: "最安全的包点深处死角，必须交三颗雷才能把我逼出来。", modifiers: [-2, -4, 1, 5, 0, 0] } ] },
            { title: "场景29: 突破失败的善后", text: "你拉出去对枪没打过，被打成了一滴血(1 HP)。你会？", options: [ { text: "1滴血也是命，继续不管不顾地拉出去，万一一枪爆头了呢。", modifiers: [3, 4, -3, -5, -1, 2] }, { text: "躲在前面充当人肉眼位，只要看到人就报点，绝不开枪暴露。", modifiers: [-1, -4, 3, 4, -2, 0] }, { text: "退回后排，手捏闪光弹化身全职道具手，给满血队友打辅助。", modifiers: [-2, -4, 4, 2, 0, 0] } ] },
            { title: "场景30: 刀人的极致诱惑", text: "你成功绕后，敌人的大背身就在你眼前，且没发现你。", options: [ { text: "掏出刀直接右键！为了最高级的羞辱和经济奖励，风险算什么！", modifiers: [1, 5, -4, -4, -1, 3] }, { text: "稳妥起见，直接掏出AK一枪爆头，绝不给对面任何反杀的机会。", modifiers: [3, -1, 1, 2, 0, -5] }, { text: "我不杀他，我静步跟着他，等他的队友全露面了我再一波刷屏。", modifiers: [-1, -4, -2, 5, 1, 1] } ] },
            { title: "场景31: 拆包的博弈(Ninja Defuse)", text: "面对烟雾里的C4，你手里有拆弹钳，你会怎么做？", options: [ { text: "直接混烟扫射，先把包围的敌人杀光再安安稳稳地拆。", modifiers: [4, 3, -2, -4, -1, 0] }, { text: "按住E直接「盲拆(Ninja defuse)」，在烟雾里跟对面赌心理博弈。", modifiers: [-1, 2, -2, -3, 0, 4] }, { text: "扔火扔雷把烟雾清掉，确保百分百安全后再上去拆包。", modifiers: [-1, -3, 2, 4, 0, -2] } ] },
            { title: "场景32: 换枪的抉择", text: "你手持AK，地上掉了一把大狙(AWP)，但你不是主狙。", options: [ { text: "坚决不捡，我的步枪比狙准一百倍，拿狙就是白给。", modifiers: [3, 2, 0, -1, -5, 1] }, { text: "肯定捡起来自己玩，谁还不是个天才狙击手，空枪了再说。", modifiers: [-1, 3, -3, -2, 5, -2] }, { text: "捡起来，然后在安全的地方丢给队里的主狙，自己重新买把枪。", modifiers: [-2, -4, 5, 2, -1, 0] } ] },
            { title: "场景33: 面对挂壁/神仙", text: "在被疑似外挂玩家碾压的回合里，你的对策是？", options: [ { text: "比挂还猛！直接拉出去跟他硬对头，试图用凡人之躯比肩神明。", modifiers: [5, 4, -4, -5, 0, 0] }, { text: "全员起吹风机或者喷子，缩在极端的死角里，等他进来强行一换一。", modifiers: [-1, -3, 4, 2, -2, 0] }, { text: "买五把大狙和各种火雷，架死所有过点，绝不露半个身位。", modifiers: [-1, -4, 2, 4, 4, -5] } ] },
            { title: "场景34: 进攻方的最后15秒", text: "作为T，时间只剩15秒，你们还没进包点。极限时间压力下你会？", options: [ { text: "不管什么搜点了，拿着枪一路狂奔进包点，见人就杀。", modifiers: [3, 5, -3, -5, -1, 1] }, { text: "赶紧把手里剩下的烟闪全丢出去，试图制造最后的混乱再冲。", modifiers: [-1, 2, 2, -2, 0, -1] }, { text: "时间不够了，直接找个安全的地方保枪，这把分不要了。", modifiers: [-2, -5, -1, 6, 1, 1] } ] },
            { title: "场景35: 决定生死的终极维度", text: "在CS2的底层逻辑中，你认为决定胜负的核心要素是？", options: [ { text: "绝对的机械动能：更快、更准的瞄准系统能摧毁一切复杂的战术体系。", modifiers: [5, 3, -4, -4, 0, 0] }, { text: "完美的系统算力：无懈可击的协同、道具覆盖和错误率极低的残局。", modifiers: [-2, -2, 4, 2, -2, 0] }, { text: "不可预知的混沌理论：利用信息差、心理战、老六阴人把对面心态打崩。", modifiers: [-1, -4, -1, 5, 2, -1] } ] },
            { title: "场景36: 经济局的购枪哲学", text: "全队只有你一个人有钱，足够买一把AWP。你会？", options: [ { text: "毫不犹豫起AWP，一把狙就能改变整个回合的走向，我就是那个关键先生。", modifiers: [2, 0, -2, 0, 5, -2] }, { text: "买AK或者M4帮队友一起起枪，团队齐装比个人秀更重要。", modifiers: [3, 2, 3, 0, -3, 0] }, { text: "买冲锋枪或者手枪，省下钱给下回合做经济储备。", modifiers: [-2, -1, 2, 3, -1, 2] } ] },
            { title: "场景37: 远距离对枪的心理", text: "超远距离（如Dust2中门对狙）发现一个敌人露头，你的第一反应是？", options: [ { text: "兴奋！这是我的主场，AWP一枪解决问题，远距离就是我的绝对领域。", modifiers: [1, 0, -1, 0, 5, -2] }, { text: "冷静点射，用AK或者M4精准爆头，远距离步枪一样能打。", modifiers: [3, 0, 0, 0, 0, 0] }, { text: "避开这个对枪位，远距离对狙不明智，绕路找近身机会。", modifiers: [-2, 2, 0, 3, -3, 1] } ] },
            { title: "场景38: 你的理想武器配置", text: "如果你只能带一把枪打完一整场天梯，你会选？", options: [ { text: "AWP。一枪一个的感觉无与伦比，远近通吃的狙击才是一切的答案。", modifiers: [1, 0, -1, 0, 6, -3] }, { text: "AK-47。最纯粹的枪法对决，近中远都能打，这才是CS的灵魂。", modifiers: [4, 3, 0, 0, -3, 0] }, { text: "M4A1-S。精准稳定，配合道具体系，打的是团队配合不是个人英雄主义。", modifiers: [-1, -2, 4, 2, -2, 2] } ] },
            { title: "场景39: 残局1v1的持枪选择", text: "1v1残局，地上有AWP和AK可以捡，你会选？", options: [ { text: "捡AWP，1v1残局我就是绝对优势，对面根本不敢peek我。", modifiers: [0, 0, -1, 1, 5, -2] }, { text: "看地形选枪：远距离图拿AWP，近距离图拿AK，灵活应变。", modifiers: [1, 1, 0, 1, 1, 2] }, { text: "拿AK，1v1需要灵活性和持续火力，AWP一枪不中就完了。", modifiers: [2, 2, 1, 1, -3, 1] } ] },
            { title: "场景40: 你最崇拜的职业选手类型", text: "以下哪种职业选手的高光时刻最让你热血沸腾？", options: [ { text: "狙击手千里之外一枪爆头，s1mple/ZywOo式的AWP统治力。", modifiers: [0, 0, 0, 0, 5, -1] }, { text: "步枪手AK四杀五杀，NiKo/ScreaM式的爆头连杀。", modifiers: [4, 3, 0, 0, -3, 0] }, { text: "IGL用战术碾压对手，gla1ve/karrigan式的智慧型胜利。", modifiers: [-2, -2, 3, 1, -2, 5] } ] }
        ];

const regularizeCov = (cov) => cov.map(v => Math.max(5, Math.min(100, Math.round(v))));
const EM_ITERATIONS = 5;

const validateModes = (players) => {
  return players.map((player) => ({
    ...player,
    modes: player.modes.map((mode) => ({
      ...mode,
      cov: regularizeCov(mode.cov),
      weight: Math.max(0.01, mode.weight)
    }))
  }));
};

// [+] 段位生态归一化系统 — 根据段位调整用户向量分布
// [+] 段位越高，向量特征越鲜明（分化越极端）
const RANK_TIERS = {
  S: { label: '顶尖修罗', magnitude: 1.25, spread: 1.3, desc: '高分段特征两极分化' },
  A: { label: '高阶精英', magnitude: 1.10, spread: 1.1, desc: '中高分段特征较明确' },
  B: { label: '进阶好手', magnitude: 0.95, spread: 0.9, desc: '中等分段特征较平衡' },
  C: { label: '鱼塘霸主', magnitude: 0.80, spread: 0.7, desc: '低分段特征模糊' }
};

// [+] 按段位归一化用户向量 — 保留原始形状倾向，调整强度
// [+] 低分段：特征压缩（趋向中庸）| 高分段：特征放大（趋向极致）
const normalizeVectorByRank = (userVec, rankId) => {
  const tier = RANK_TIERS[rankId] || RANK_TIERS.B;
  const mean = userVec.reduce((a, b) => a + b, 0) / userVec.length;
  const centered = userVec.map((v) => v - mean);
  const scaled = centered.map((v) => v * tier.spread);
  const restored = scaled.map((v) => v + mean);
  return restored.map((v) => Math.min(Math.max(Math.round(v), 5), 99));
};

// [+] 置信度校准 — 将原始权重转为 0-100 可解读百分比
// [+] 考虑：权重占比 + 马氏距离 + 分布熵
const calibrateConfidence = (rawWeight, totalWeight, mahalDist, allWeights) => {
  const share = totalWeight > 0 ? rawWeight / totalWeight : 0;
  const distScore = Math.max(0, 1 - mahalDist / 200);
  const entropy = allWeights.length > 1
    ? allWeights.reduce((s, w) => {
        const p = w / totalWeight;
        return p > 0 ? s - p * Math.log(p) : s;
      }, 0) / Math.log(allWeights.length)
    : 0;
  const certainty = 1 - Math.min(1, entropy);
  const confidence = (share * 0.5 + distScore * 0.3 + certainty * 0.2) * 100;
  return Math.min(95, Math.max(5, Math.round(confidence)));
};

// [+] 自适应EM收敛 — 在标准EM上增加收敛检测，提前终止
// ─── GMM Math Helpers ───────────────────────────────────────────
const mahalanobis = (v, mean, cov) => {
  let d = 0;
  for (let i = 0; i < v.length; i++) d += ((v[i] - mean[i]) ** 2) / Math.max(1, cov[i]);
  return Math.sqrt(d);
};
const logLikelihood = (v, mean, cov) => {
  const n = v.length;
  let sum = 0;
  for (let i = 0; i < n; i++) sum += ((v[i] - mean[i]) ** 2) / Math.max(1, cov[i]);
  const logDet = cov.reduce((s, c) => s + Math.log(Math.max(1, c)), 0);
  return -0.5 * (n * Math.log(2 * Math.PI) + logDet + sum);
};
const logSumExp = (arr) => {
  const max = Math.max(...arr);
  return max + Math.log(arr.reduce((s, x) => s + Math.exp(x - max), 0));
};
const cosineSimilarity = (a, b) => {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] ** 2; nb += b[i] ** 2; }
  return dot / Math.max(1, Math.sqrt(na) * Math.sqrt(nb));
};
const euclideanDistance = (a, b) => {
  let d = 0;
  for (let i = 0; i < a.length; i++) d += (a[i] - b[i]) ** 2;
  return Math.sqrt(d);
};
const manhattanDistance = (a, b) => {
  let d = 0;
  for (let i = 0; i < a.length; i++) d += Math.abs(a[i] - b[i]);
  return d;
};

const adaptiveEMRefine = (userVec, player, maxIter) => {
  let modes = player.modes.map((m) => ({
    mean: [...m.mean],
    cov: regularizeCov([...m.cov]),
    weight: m.weight
  }));
  const CONVERGENCE_THRESHOLD = 0.001;

  for (let iter = 0; iter < maxIter; iter++) {
    const logWeighted = modes.map((mode) =>
      Math.log(mode.weight) + logLikelihood(userVec, mode.mean, mode.cov)
    );
    const logNorm = logSumExp(logWeighted);
    const responsibilities = logWeighted.map((lw) => Math.exp(lw - logNorm));
    const totalResp = responsibilities.reduce((a, b) => a + b, 0);

    let maxWeightChange = 0;
    if (totalResp > 0) {
      modes = modes.map((mode, k) => {
        const newWeight = Math.max(0.01, responsibilities[k] / totalResp);
        maxWeightChange = Math.max(maxWeightChange, Math.abs(newWeight - mode.weight));
        return { ...mode, weight: newWeight };
      });
    }
    if (maxWeightChange < CONVERGENCE_THRESHOLD) break; // [+] 提前收敛
  }
  return modes;
};
const emRefinePlayer = adaptiveEMRefine; // alias for findBestMatch

// ===== [Step 1] 动态权重自适应 =====
// 根据用户向量的离散程度、维度方差动态调整各指标的权重
const computeDynamicWeights = (userVec, bestMode) => {
  const dimVariance = userVec.reduce((s, v) => s + (v - userVec.reduce((a, b) => a + b, 0) / userVec.length) ** 2, 0) / userVec.length;
  const spread = Math.sqrt(dimVariance);
  const profileClarity = Math.min(1, spread / 20); // 0~1: 用户画像清晰度

  const dot = userVec.reduce((s, v, i) => s + v * bestMode.mean[i], 0);
  const normU = Math.sqrt(userVec.reduce((s, v) => s + v * v, 0));
  const normP = Math.sqrt(bestMode.mean.reduce((s, v) => s + v * v, 0));
  const cos = normU && normP ? dot / (normU * normP) : 0;
  const cosReliability = Math.min(1, Math.abs(cos) + 0.2); // 余弦可信度

  // 自适应权重：画像清晰 -> 更依赖gmm；余弦可靠 -> 更依赖cos
  const wGmm = 0.3 + 0.3 * profileClarity;
  const wCos = 0.2 + 0.2 * cosReliability;
  const wEuc = 0.2 + 0.1 * (1 - profileClarity);
  const wMan = 0.1 + 0.1 * (1 - cosReliability);
  const total = wGmm + wCos + wEuc + wMan;
  return { wGmm: wGmm / total, wCos: wCos / total, wEuc: wEuc / total, wMan: wMan / total, profileClarity };
};
// ===================================

	// [+] 混合相似度评分 — 综合GMM似然 + 余弦相似度 + 欧氏距离 + 曼哈顿距离 + 动态权重
	const computeHybridScore = (userVec, player, refinedModes) => {
	  const logComponentLLs = refinedModes.map((mode) =>
	    Math.log(mode.weight) + logLikelihood(userVec, mode.mean, mode.cov)
	  );
	  const logMixtureLL = logSumExp(logComponentLLs);
	  const gmmNorm = 1 / (1 + Math.exp(-(logMixtureLL + 25) / 10));

	  const bestMode = refinedModes.reduce((best, mode) => {
	    const d = mahalanobis(userVec, mode.mean, mode.cov);
	    return d < best.dist ? { mode, dist: d } : best;
	  }, { mode: refinedModes[0], dist: Infinity }).mode;

	  const cosine = cosineSimilarity(userVec, bestMode.mean);
	  const mahalDist = mahalanobis(userVec, bestMode.mean, bestMode.cov);
	  const euclid = euclideanDistance(userVec, bestMode.mean);
	  const manhattan = manhattanDistance(userVec, bestMode.mean);

	  const euclidSim = Math.max(0, 1 - euclid / 200);
	  const manhattanSim = Math.max(0, 1 - manhattan / 600);

	  const dynW = computeDynamicWeights(userVec, bestMode);

	  const hybrid = dynW.wGmm * gmmNorm
	               + dynW.wCos * Math.max(0, cosine)
	               + dynW.wEuc * euclidSim
	               + dynW.wMan * manhattanSim;

	  return { hybrid, gmmNorm, cosine, mahalDist, euclid, manhattan, bestMode, weights: dynW };
	};

// [+] 维度画像分析 — 计算用户的突出维度和薄弱维度
const analyzeProfile = (userVec, player, refinedModes) => {
  const DIM_NAMES = ['绝对火力', '破点侵略', '团队协同', '残局生存', '狙击偏好', '战术大脑'];
  const bestMode = refinedModes.reduce((best, mode) => {
    const d = mahalanobis(userVec, mode.mean, mode.cov);
    return d < best.dist ? { mode, dist: d } : best;
  }, { mode: refinedModes[0], dist: Infinity }).mode;

  const deviations = userVec.map((v, i) => ({
    dim: DIM_NAMES[i],
    value: v,
    diff: v - bestMode.mean[i],
    absDiff: Math.abs(v - bestMode.mean[i])
  }));
  deviations.sort((a, b) => b.absDiff - a.absDiff);

  const strengths = deviations.filter((d) => d.diff > 5).slice(0, 2);
  const weaknesses = deviations.filter((d) => d.diff < -5).slice(0, 2);

  const overall = userVec.reduce((s, v) => s + v, 0) / userVec.length;
  const balance = 1 - deviations.reduce((s, d) => s + d.absDiff, 0) / (userVec.length * 50);

  return {
    strengths: strengths.map((d) => d.dim),
    weaknesses: weaknesses.map((d) => d.dim),
    overall,
    balance: Math.max(0, Math.min(1, balance)),
    dominantDim: deviations[0]?.dim || DIM_NAMES[0],
    bestModeMean: bestMode.mean
  };
};

// Weighted random selection with tiered weights
const MAJOR_2026_WEIGHT = 20.0; // 2026 Major现役选手 - 最高权重
const TOP_PLAYER_WEIGHT = 8.0; // HLTV历史TOP选手
const OTHER_PLAYER_WEIGHT = 1.0; // 其他选手
const SAME_POSITION_WEIGHT = 3.0; // 同位置选手加成（降低以避免狙击手过度集中）
const SCORE_SHARPNESS = 0.05;

// Classify user into position based on answer vector
// Vector: [firepower, aggression, team, survival, sniper, utility]
const classifyUserPosition = (vec) => {
  const [fp, ag, tm, sv, sn, ut] = vec;
  // Score each position
  const scores = {
    entry: ag * 2 + fp * 1.5 - sv * 0.5 - ut * 0.3 + sn * 0.2,
    awper: sn * 2 + fp * 0.5 - ag * 0.3 + sv * 0.2,
    igl: ut * 2 + tm * 1.5 + ag * 0.5 + fp * 0.3,
    lurker: sv * 2 + ut * 1.5 - ag * 0.5 + sn * 0.5,
    support: tm * 2 + ut * 1.5 + sv * 0.5 - ag * 0.3
  };
  let best = 'support';
  let bestScore = -Infinity;
  for (const [pos, score] of Object.entries(scores)) {
    if (score > bestScore) {bestScore = score;best = pos;}
  }
  return best;
};

// Find best match using GMM + EM + Mahalanobis + Bayes + Weighted Random
const findBestMatch = (userVec, players) => {
  const validatedPlayers = validateModes(players);
  const userPosition = classifyUserPosition(userVec);

  const allScores = validatedPlayers.map((player) => {
    const is2026Major = MAJOR_2026_IDS.has(player.id);
    const isTopPlayer = HLTV_TOP_IDS.has(player.id);
    const isSamePosition = player.position === userPosition;
    const baseWeight = is2026Major ? MAJOR_2026_WEIGHT : isTopPlayer ? TOP_PLAYER_WEIGHT : OTHER_PLAYER_WEIGHT;
    const positionMultiplier = isSamePosition ? SAME_POSITION_WEIGHT : 1.0;

    // EM refinement: adjust mixture weights based on user vector
    const refinedModes = emRefinePlayer(userVec, player, EM_ITERATIONS);

    // [+] 混合评分：GMM似然 + 余弦形状 + 欧氏距离
    const hybridResult = computeHybridScore(userVec, player, refinedModes);

    // Final weight: base weight * position match * GMM likelihood
    const finalWeight = baseWeight * positionMultiplier * Math.exp(SCORE_SHARPNESS * hybridResult.gmmNorm);

    return {
      id: player.id,
      player: player,
      weight: finalWeight,
      score: hybridResult.hybrid,
      bestMode: hybridResult.bestMode,
      mahalDist: hybridResult.mahalDist,
      refinedModes: refinedModes
    };
  });

  // [+] 置信度校准
  const totalWeight = allScores.reduce((sum, s) => sum + s.weight, 0);
  const allWeights = allScores.map((s) => s.weight);
  const calibratedScores = allScores.map((s) => ({
    ...s,
    confidence: calibrateConfidence(s.weight, totalWeight, s.mahalDist, allWeights)
  }));

  // Weighted random selection
  let rand = Math.random() * totalWeight;
  let selected = calibratedScores[0];
  for (const s of calibratedScores) {
    rand -= s.weight;
    if (rand <= 0) {selected = s;break;}
  }

  // [+] Top3 使用校准后置信度
  const sorted = [...calibratedScores].sort((a, b) => b.weight - a.weight);
  const top3 = sorted.slice(0, 3).map((s) => ({
    player: s.player,
    confidence: s.confidence,
    mahalDist: s.mahalDist
  }));

  const best = selected.player;
  // [+] 生成维度画像
  const profile = analyzeProfile(userVec, best, selected.refinedModes);
  return { best, top3, userPosition, profile };
};

// Compute user's best mode for each player (for radar display)
const findBestMode = (userVec, player) => {
  const regModes = player.modes.map((m) => ({
    ...m,
    cov: regularizeCov(m.cov)
  }));
  let bestMode = regModes[0];
  let bestDist = Infinity;
  regModes.forEach((mode) => {
    const dist = mahalanobis(userVec, mode.mean, mode.cov);
    if (dist < bestDist) {
      bestDist = dist;
      bestMode = mode;
    }
  });
  return bestMode;
};

const getDisplayName = (name) => {
  const q = name.split('"');
  const nick = q[1] || name;
  const yearMatch = name.match(/\((\d{4}[^)]*)\)/);
  return yearMatch ? `${nick} · ${yearMatch[1]}` : nick;
};

const getBilibiliSearchUrl = (player) => {
  // 优先使用BILIBILI_VIDEO_MAP中的直接视频链接
  const directUrl = BILIBILI_VIDEO_MAP[player.id];
  if (directUrl) return directUrl;
  // 否则走B站搜索
  const vidText = player.bilibiliVid || '';
  const match = vidText.match(/B站搜索：\[(.+?)\]/);
  const query = match ? match[1] : player.name.replace(/"/g, '').split(' ').pop();
  return 'https://search.bilibili.com/all?keyword=' + encodeURIComponent(query + ' CS2 高光');
};

const getPlayerProfile = (player) => {
  const customData = PLAYER档案_DATA[player.id];
  if (customData) return customData;
  const label = player.label || '';
  const desc = player.desc || '';
  const isSniper = label.includes('狙') || desc.includes('AWP') || desc.includes('狙击');
  const isIGL = label.includes('指挥') || label.includes('IGL') || label.includes('战术') || desc.includes('指挥');
  const isEntry = label.includes('突破') || desc.includes('突破');
  const isSupport = label.includes('辅助') || label.includes('道具') || desc.includes('辅助');
  let playstyle = '全能型选手。';
  if (isSniper) playstyle = '狙击型选手。AWP使用精准，擅长在固定位置输出稳定伤害。';
  else if (isIGL) playstyle = '战术指挥型。道具使用和战术安排能力突出，团队核心。';
  else if (isEntry) playstyle = '突破型选手。侵略性强，敢于第一个冲出去为团队打开局面。';
  else if (isSupport) playstyle = '辅助型选手。道具使用精准，团队配合意识强。';
  return {
    bio: player.name + '，' + player.team + '战队' + (player.team.includes('Historic') ? '历史' : '现役') + '选手。' + desc,
    playstyle: playstyle,
    achievements: label + ' | ' + player.team
